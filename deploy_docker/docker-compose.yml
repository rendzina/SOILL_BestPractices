# Local smoke test of the production image against MongoDB Atlas.
# From the repository root:
#   docker compose -f deploy_docker/docker-compose.yml --env-file .env up --build
#
# Requires .env at the repo root (MONGO_URI, MISTRAL_API_KEY, etc.).

services:
  soill-chatbot:
    build:
      context: ..
      dockerfile: deploy_docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      PORT: "8000"
      # Set to 1 to force a FAISS rebuild on every container start (slower).
      # REBUILD_FAISS_ON_START: "1"
